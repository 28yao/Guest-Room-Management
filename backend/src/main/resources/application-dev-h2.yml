# 无需 MySQL 的本地开发配置：mvn spring-boot:run -Dspring-boot.run.profiles=dev-h2
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/grms_dev;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: embedded
      schema-locations: classpath:db/h2-schema.sql
      data-locations: classpath:db/h2-data.sql
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.hotel.grms: debug
