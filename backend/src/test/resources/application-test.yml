spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:grms_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: grms-test-jwt-secret-key-32bytes-min!!
  expiration-ms: 3600000
